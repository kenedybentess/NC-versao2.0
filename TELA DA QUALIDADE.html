<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela da Qualidade - RNC Elgin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
       .header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(17,153,142,0.3); }
        h1 { font-size: 28px; margin-bottom: 5px; }
       .sub { opacity: 0.9; font-size: 14px; }
       .container { max-width: 1800px; margin: 0 auto; }
       .topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
       .voltar { padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
       .btn-export { padding: 10px 20px; background: #217346; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
       .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
       .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid; position: relative; }
       .card.vermelho { border-color: #e74c3c; }
       .card.laranja { border-color: #f39c12; }
       .card.roxo { border-color: #9b59b6; }
       .card.verde { border-color: #27ae60; }
       .card-num { font-size: 36px; font-weight: bold; color: #2c3e50; }
       .card-label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; margin-top: 5px; font-weight: 600; }
       .card-icon { position: absolute; top: 15px; right: 15px; font-size: 24px; opacity: 0.3; }
       .busca-box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
       .busca-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
       .tabela-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background: #f8f9fa; font-weight: 600; color: #2c3e50; position: sticky; top: 0; }
        tr.urgente { background: #fff5f5; }
        tr.muito-urgente { background: #ffe5e5; }
        tr:hover { background: #f8f9fa; }
       .badge-dias { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
       .badge-normal { background: #e8f5e9; color: #2e7d32; }
       .badge-alerta { background: #fff3e0; color: #e65100; }
       .badge-critico { background: #ffebee; color: #c62828; }
       .btn-aprovar { background: #27ae60; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 5px; font-weight: 600; }
       .btn-aprovar:hover { background: #229954; }
       .btn-reprovar { background: #e74c3c; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
       .btn-reprovar:hover { background: #c0392b; }
       .nao-conf { max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
       .loading { text-align: center; padding: 40px; color: #95a5a6; }
       .vazio { text-align: center; padding: 60px; color: #27ae60; font-size: 18px; }
       .vazio-icon { font-size: 48px; margin-bottom: 10px; }
        @media (max-width: 768px) {.cards { grid-template-columns: 1fr 1fr; } h1 { font-size: 22px; }}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✅ TELA DA QUALIDADE</h1>
            <div class="sub">Aprovação de Não Conformidades - Realtime Database nc-versao2</div>
        </div>

        <div class="topo">
            <a href="index.html" class="voltar">← Voltar ao Sistema</a>
            <button class="btn-export" onclick="exportarAbertas()">📊 Exportar Abertas</button>
        </div>

        <div class="cards">
            <div class="card vermelho">
                <div class="card-icon">⚠️</div>
                <div class="card-num" id="qtdAbertas">0</div>
                <div class="card-label">RNCs Abertas</div>
            </div>
            <div class="card laranja">
                <div class="card-icon">⏰</div>
                <div class="card-num" id="qtd7dias">0</div>
                <div class="card-label">+ 7 Dias</div>
            </div>
            <div class="card roxo">
                <div class="card-icon">🚨</div>
                <div class="card-num" id="qtd30dias">0</div>
                <div class="card-label">+ 30 Dias</div>
            </div>
            <div class="card verde">
                <div class="card-icon">🔥</div>
                <div class="card-num" id="qtdCriticas">0</div>
                <div class="card-label">Críticas</div>
            </div>
        </div>

        <div class="busca-box">
            <input type="text" id="busca" placeholder="🔍 Buscar por NF, Código Peça, Produto ou Não Conformidade..." oninput="filtrar()">
        </div>

        <div class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Data</th><th>Produto</th><th>Peça</th><th>Denominação</th><th>Origem</th><th>NF</th><th>QTD</th><th>Não Conformidade</th><th>Dias</th><th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tbody"><tr><td colspan="10" class="loading">Carregando RNCs abertas...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import * as XLSX from 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm';

        const firebaseConfig = {
          apiKey: "AIzaSyCSdAsEHqgjAhHFcNn0xX4IwtA2GZ7-u-Y",
          authDomain: "nc-versao2.firebaseapp.com",
          databaseURL: "https://nc-versao2-default-rtdb.firebaseio.com",
          projectId: "nc-versao2",
          storageBucket: "nc-versao2.firebasestorage.app",
          messagingSenderId: "584567247229",
          appId: "1:584567247229:web:9c397236f3e08cc3247c14"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let rncsAbertas = [];
        const hoje = new Date();

        onValue(ref(db, 'rncs'), (snap) => {
            const todas = snap.exists()? Object.entries(snap.val()).map(([id, d]) => ({id,...d})) : [];
            rncsAbertas = todas.filter(r => r.status === 'Aberta');
            renderizar(rncsAbertas);
        });

        function renderizar(lista) {
            // Cards
            document.getElementById('qtdAbertas').innerText = lista.length;
            
            const dias7 = lista.filter(r => diasAberta(r.data) > 7).length;
            const dias30 = lista.filter(r => diasAberta(r.data) > 30).length;
            const criticas = lista.filter(r => r.origem_defeito === 'Fornecedor' && r.qtd > 100).length;
            
            document.getElementById('qtd7dias').innerText = dias7;
            document.getElementById('qtd30dias').innerText = dias30;
            document.getElementById('qtdCriticas').innerText = criticas;

            // Tabela
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            
            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="vazio"><div class="vazio-icon">🎉</div>Nenhuma RNC aberta!<br><small>Todas resolvidas</small></td></tr>';
                return;
            }

            lista.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(r => {
                const dias = diasAberta(r.data);
                const classe = dias > 30? 'muito-urgente' : dias > 7? 'urgente' : '';
                const badge = dias > 30? 'badge-critico' : dias > 7? 'badge-alerta' : 'badge-normal';
                
                const tr = document.createElement('tr');
                tr.className = classe;
                tr.innerHTML = `
                    <td>${new Date(r.data + 'T00:00:00').toLocaleDateString('pt-BR')}</td>
                    <td>${r.cod_produto}</td>
                    <td><strong>${r.cod_peca}</strong></td>
                    <td>${r.denominacao}</td>
                    <td>${r.origem_defeito || '-'}</td>
                    <td>${r.nf}</td>
                    <td>${r.qtd}</td>
                    <td class="nao-conf" title="${r.nao_conforme}">${r.nao_conforme}</td>
                    <td><span class="badge-dias ${badge}">${dias}d</span></td>
                    <td>
                        <button class="btn-aprovar" onclick="aprovar('${r.id}')">✓ Aprovar</button>
                        <button class="btn-reprovar" onclick="reprovar('${r.id}')">✗ Reprovar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function diasAberta(dataStr) {
            return Math.floor((hoje - new Date(dataStr)) / (1000*60*60*24));
        }

        window.aprovar = async function(id) {
            if (!confirm('Confirma aprovação desta RNC?\nEla será fechada.')) return;
            try {
                await update(ref(db, `rncs/${id}`), {
                    status: 'Fechada',
                    aprovado_por: 'QUALIDADE',
                    data_aprovacao: new Date().toISOString()
                });
                alert('RNC aprovada e fechada!');
            } catch (e) {
                alert('Erro: ' + e.message);
            }
        }

        window.reprovar = async function(id) {
            const motivo = prompt('Motivo da reprovação:\n(Será enviado ao inspetor)');
            if (!motivo) return;
            try {
                await update(ref(db, `rncs/${id}`), {
                    status: 'Aberta',
                    observacao_qualidade: motivo,
                    reprovado_por: 'QUALIDADE',
                    data_reprovacao: new Date().toISOString()
                });
                alert('RNC reprovada. Inspetor será notificado.');
            } catch (e) {
                alert('Erro: ' + e.message);
            }
        }

        window.filtrar = function() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const filtradas = rncsAbertas.filter(r => 
                r.nf.toLowerCase().includes(termo) ||
                r.cod_peca.toLowerCase().includes(termo) ||
                r.cod_produto.toLowerCase().includes(termo) ||
                r.nao_conforme.toLowerCase().includes(termo) ||
                r.denominacao.toLowerCase().includes(termo)
            );
            renderizar(filtradas);
        }

        window.exportarAbertas = function() {
            if (rncsAbertas.length === 0) { alert('Nenhuma RNC aberta para exportar!'); return; }
            const dados = rncsAbertas.map(r => ({
                Data: r.data,
                'Dias Aberta': diasAberta(r.data),
                'Cód. Produto': r.cod_produto,
                'Cód. Peça': r.cod_peca,
                'Denominação': r.denominacao,
                'Origem': r.origem_defeito,
                'NF': r.nf,
                'QTD': r.qtd,
                'Não Conformidade': r.nao_conforme,
                'Inspetor': r.visto
            }));
            const ws = XLSX.utils.json_to_sheet(dados);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'RNCs Abertas');
            XLSX.writeFile(wb, `RNCs_Abertas_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    </script>
</body>
</html>
