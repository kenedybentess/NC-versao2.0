<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard RNC - Elgin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 15px; }
      .container { max-width: 1600px; margin: 0 auto; }
      .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        h1 { font-size: 24px; margin-bottom: 3px; }
      .sub { opacity: 0.9; font-size: 13px; }
      .voltar { display: inline-block; margin: 15px 0; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-size: 14px; }
      .erro-box { background: #ffebee; color: #c62828; padding: 10px; border-radius: 5px; margin-bottom: 15px; border-left: 3px solid #c62828; display: none; font-size: 13px; }
      .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
      .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); border-left: 3px solid; }
      .card.total { border-color: #0056b3; }
      .card.abertas { border-color: #dc3545; }
      .card.fechadas { border-color: #28a745; }
      .card.pecas { border-color: #17a2b8; }
      .card-titulo { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
      .card-valor { font-size: 28px; font-weight: bold; color: #333; }
      .card-desc { font-size: 11px; color: #999; }
      .graficos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px; }
      .grafico-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); height: 280px; position: relative; }
      .grafico-box canvas { max-height: 220px!important; }
      .grafico-titulo { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #333; }
      .tabela-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
      .loading { text-align: center; padding: 30px; color: #999; font-size: 13px; }
      .status-online { display: inline-block; width: 7px; height: 7px; background: #28a745; border-radius: 50%; margin-right: 4px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @media (max-width: 900px) {.graficos { grid-template-columns: 1fr; }.grafico-box { height: 260px; } h1 { font-size: 20px; }}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard RNC - Elgin</h1>
            <div class="sub">Realtime Database nc-versao2 <span class="status-online"></span>Online</div>
        </div>

        <a href="index.html" class="voltar">← Cadastro</a>
        <div id="erroBox" class="erro-box"></div>

        <div class="cards">
            <div class="card total">
                <div class="card-titulo">Total RNCs</div>
                <div class="card-valor" id="totalRNCs">0</div>
                <div class="card-desc">Todas cadastradas</div>
            </div>
            <div class="card abertas">
                <div class="card-titulo">Abertas</div>
                <div class="card-valor" id="rncsAbertas">0</div>
                <div class="card-desc">Aguardando ação</div>
            </div>
            <div class="card fechadas">
                <div class="card-titulo">Fechadas</div>
                <div class="card-valor" id="rncsFechadas">0</div>
                <div class="card-desc">Resolvidas</div>
            </div>
            <div class="card pecas">
                <div class="card-titulo">Peças</div>
                <div class="card-valor" id="totalPecas">0</div>
                <div class="card-desc">Lista mestre</div>
            </div>
        </div>

        <div class="graficos">
            <div class="grafico-box">
                <div class="grafico-titulo">RNCs por Origem</div>
                <canvas id="graficoOrigem"></canvas>
            </div>
            <div class="grafico-box">
                <div class="grafico-titulo">Status Geral</div>
                <canvas id="graficoStatus"></canvas>
            </div>
            <div class="grafico-box">
                <div class="grafico-titulo">Top 5 Peças</div>
                <canvas id="graficoPecas"></canvas>
            </div>
            <div class="grafico-box">
                <div class="grafico-titulo">Por Mês</div>
                <canvas id="graficoMes"></canvas>
            </div>
        </div>

        <div class="tabela-box">
            <div class="grafico-titulo">Últimas 10 RNCs</div>
            <table>
                <thead>
                    <tr>
                        <th>Data</th><th>Produto</th><th>Peça</th><th>Origem</th><th>NF</th><th>QTD</th><th>Status</th>
                    </tr>
                </thead>
                <tbody id="tbodyRecentes"><tr><td colspan="7" class="loading">Carregando...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCSdAsEHqgjAhHFcNn0xX4IwtA2GZ7-u-Y",
          authDomain: "nc-versao2.firebaseapp.com",
          databaseURL: "https://nc-versao2-default-rtdb.firebaseio.com",
          projectId: "nc-versao2",
          storageBucket: "nc-versao2.firebasestorage.app",
          messagingSenderId: "584567247229",
          appId: "1:584567247229:web:9c397236f3e08cc3247c14"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let chartOrigem, chartMes, chartPecas, chartStatus;

        const optPequeno = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { 
                    display: true, 
                    position: 'bottom',
                    labels: { boxWidth: 10, font: { size: 10 }, padding: 8 }
                }
            },
            scales: {
                x: { ticks: { font: { size: 10 } } },
                y: { ticks: { font: { size: 10 } } }
            }
        };

        onValue(ref(db, 'rncs'), (snap) => {
            document.getElementById('erroBox').style.display = 'none';
            const rncs = snap.exists()? Object.values(snap.val()) : [];
            atualizar(rncs);
        }, (err) => {
            document.getElementById('erroBox').style.display = 'block';
            document.getElementById('erroBox').innerText = `Erro: ${err.message}`;
        });

        onValue(ref(db, 'pecas'), (snap) => {
            document.getElementById('totalPecas').innerText = snap.exists()? Object.keys(snap.val()).length : 0;
        });

        function atualizar(rncs) {
            document.getElementById('totalRNCs').innerText = rncs.length;
            document.getElementById('rncsAbertas').innerText = rncs.filter(r => r.status === 'Aberta').length;
            document.getElementById('rncsFechadas').innerText = rncs.filter(r => r.status === 'Fechada').length;

            // Origem
            const origem = {};
            rncs.forEach(r => origem[r.origem_defeito || 'N/I'] = (origem[r.origem_defeito || 'N/I'] || 0) + 1);
            criarGrafico('graficoOrigem', 'bar', origem, chartOrigem, c => chartOrigem = c);

            // Mês
            const mes = {};
            rncs.forEach(r => {
                const m = r.data? r.data.substring(0,7) : 'S/D';
                mes[m] = (mes[m] || 0) + 1;
            });
            criarGrafico('graficoMes', 'line', mes, chartMes, c => chartMes = c);

            // Top 5 Peças
            const pecas = {};
            rncs.forEach(r => pecas[r.cod_peca] = (pecas[r.cod_peca] || 0) + 1);
            const top5 = Object.entries(pecas).sort((a,b) => b[1]-a[1]).slice(0,5).reduce((o,[k,v]) => (o[k]=v,o), {});
            criarGrafico('graficoPecas', 'bar', top5, chartPecas, c => chartPecas = c, true);

            // Status
            const abertas = rncs.filter(r => r.status === 'Aberta').length;
            const fechadas = rncs.filter(r => r.status === 'Fechada').length;
            criarGrafico('graficoStatus', 'doughnut', {'Abertas':abertas,'Fechadas':fechadas}, chartStatus, c => chartStatus = c);

            // Tabela
            const tbody = document.getElementById('tbodyRecentes');
            tbody.innerHTML = '';
            rncs.sort((a,b) => new Date(b.data) - new Date(a.data)).slice(0,10).forEach(r => {
                tbody.innerHTML += `
                    <tr>
                        <td>${new Date(r.data + 'T00:00:00').toLocaleDateString('pt-BR')}</td>
                        <td>${r.cod_produto}</td>
                        <td>${r.cod_peca}</td>
                        <td>${r.origem_defeito || '-'}</td>
                        <td>${r.nf}</td>
                        <td>${r.qtd}</td>
                        <td>${r.status}</td>
                    </tr>
                `;
            });
            if(rncs.length === 0) tbody.innerHTML = '<tr><td colspan="7" class="loading">Nenhuma RNC</td></tr>';
        }

        function criarGrafico(id, tipo, dados, chartVar, setChart, horizontal = false) {
            const ctx = document.getElementById(id);
            if (chartVar) chartVar.destroy();
            const novo = new Chart(ctx, {
                type: tipo,
                data: {
                    labels: Object.keys(dados),
                    datasets: [{
                        data: Object.values(dados),
                        backgroundColor: tipo === 'doughnut'? ['#dc3545','#28a745'] : 'rgba(102, 126, 234, 0.7)',
                        borderColor: tipo === 'doughnut'? ['#dc3545','#28a745'] : 'rgba(102, 126, 234, 1)',
                        borderWidth: 1
                    }]
                },
                options: {...optPequeno, indexAxis: horizontal? 'y' : 'x'}
            });
            setChart(novo);
        }
    </script>
</body>
</html>
