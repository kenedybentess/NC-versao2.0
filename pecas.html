<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Peças - Elgin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <h1>Cadastro de Peças</h1>
    <div id="lista-pecas">Carregando peças...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- ATUALIZE ESTAS CONFIGURAÇÕES COM O SEU PAINEL FIREBASE ---
        const firebaseConfig = {
            apiKey: "SUA_NOVA_API_KEY_AQUI",
            authDomain: "nc-versao2.firebaseapp.com",
            databaseURL: "https://nc-versao2-default-rtdb.firebaseio.com",
            projectId: "nc-versao2",
            storageBucket: "nc-versao2.firebasestorage.app",
            messagingSenderId: "584567247229",
            appId: "1:584567247229:web:9c397236f3e08cc3247c14",
            measurementId: "G-F9HFPQ07K2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Função para carregar as peças
        function carregarPecas() {
            const pecasRef = ref(db, 'pecas');
            onValue(pecasRef, (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('lista-pecas');
                
                if (!data) {
                    container.innerHTML = "Nenhuma peça cadastrada.";
                    return;
                }

                let html = '<table><tr><th>Código</th><th>Descrição</th><th>Quantidade</th><th>Min.</th></tr>';
                Object.keys(data).forEach(key => {
                    const peca = data[key];
                    html += `<tr><td>${peca.codigo}</td><td>${peca.descricao}</td><td>${peca.quantidade}</td><td>${peca.quantidadeMinima}</td></tr>`;
                });
                html += '</table>';
                container.innerHTML = html;
            }, (error) => {
                console.error("Erro ao carregar dados: ", error);
                document.getElementById('lista-pecas').innerHTML = "Erro ao carregar peças. Verifique o console.";
            });
        }

        // Executa a função
        carregarPecas();
    </script>
</body>
</html>
